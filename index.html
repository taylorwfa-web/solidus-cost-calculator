<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e63946" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Solidus" />
  <meta name="description" content="Solidus FDM Production Cost System" />
  <title>Solidus — Cost Calculator</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; }
    body { font-family: 'IBM Plex Mono', 'Courier New', monospace; color: #e0e0e0; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100%; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    select option { background: #111; color: #e0e0e0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    textarea { font-family: 'IBM Plex Mono', 'Courier New', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const KWH_RATE=4.09, K1C_WATTS=350, K2_WATTS=500, DRYER_WATTS=360, WORKSTATION_WATTS=400;
    const K1C_RATE=(K1C_WATTS/1000)*KWH_RATE, K2_RATE=(K2_WATTS/1000)*KWH_RATE;
    const DRYER_RATE=(DRYER_WATTS/1000)*KWH_RATE, WORKSTATION_RATE=(WORKSTATION_WATTS/1000)*KWH_RATE;
    const CAD_RATE=150, OPS_RATE=180, FINISH_RATE_MIN=180/60;

    // Auto wear rates by material class
    const WEAR={
      1:{nozzle_per_g:0.015,pei_per_hr:0.80,label:"Class 1 — standard"},
      2:{nozzle_per_g:0.030,pei_per_hr:0.90,label:"Class 2 — additive"},
      3:{nozzle_per_g:0.100,pei_per_hr:1.20,label:"Class 3 — abrasive CF/GF"},
    };
    const detectWearClass=(label)=>{
      const l=(label||"").toLowerCase();
      if(/cf|gf|carbon|glass|fiber|fibre|reinforced/.test(l))return 3;
      if(/esd|fr-abs|fr abs|flame/.test(l))return 2;
      return 1;
    };

    const MACHINES={
      k1c:{label:"K1C — Standard",rate:K1C_RATE,watts:K1C_WATTS},
      k2:{label:"K2 Plus — Engineering/Reinforced (CFS)",rate:K2_RATE,watts:K2_WATTS},
    };
    const FINISH_MULTIPLIERS={
      as_printed:{label:"As Printed",labour:0},
      cleaned:{label:"Cleaned",labour:15},
      smoothed:{label:"Smoothed",labour:45},
      polished:{label:"Polished (ABS only)",labour:90},
    };
    const BULK_TIERS=[
      {min:1,max:9,pct:0,label:"No discount (1-9 units)"},
      {min:10,max:24,pct:5,label:"5% off (10-24 units)"},
      {min:25,max:49,pct:10,label:"10% off (25-49 units)"},
      {min:50,max:9999,pct:15,label:"15% off (50+ units)"},
    ];
    const getSuggestedTier=(qty)=>{const q=parseInt(qty)||1;return BULK_TIERS.find(t=>q>=t.min&&q<=t.max)||BULK_TIERS[0];};
    const MARKUP_TIERS=[
      {label:"COST RECOVERY",min:1.0,max:1.5},
      {label:"ENTRY/VOLUME",min:2.0,max:2.5},
      {label:"ENGINEERING",min:2.8,max:3.8},
      {label:"INDUSTRIAL",min:4.0,max:6.0},
    ];
    const MULTIPLIERS=[1.0,1.5,2.0,2.2,2.5,2.8,3.0,3.2,3.5,3.8,4.0,4.2,4.5,5.0,5.5,6.0];
    const RISK_LEVELS=[
      {level:1,label:"LOW",bufferPct:0,complexity:"Very stable - standard materials",strategy:"Standard pricing, no buffer required"},
      {level:2,label:"MED",bufferPct:2.5,complexity:"Low instability - minor environmental control",strategy:"Small contingency recommended"},
      {level:3,label:"HIGH",bufferPct:7.5,complexity:"Controlled environment required - drying/enclosure",strategy:"Add 5-10% risk buffer"},
      {level:4,label:"EXTREME",bufferPct:15,complexity:"High skill required - expensive scrap risk",strategy:"Add 10-20% risk buffer"},
      {level:5,label:"CRITICAL",bufferPct:22.5,complexity:"Mission-critical, exotic materials",strategy:"Full process qualification, dedicated machine time"},
    ];
    const QUOTE_STATUS=["PENDING","ACCEPTED","DECLINED"];
    const STATUS_COL={PENDING:"#b48c3c",ACCEPTED:"#4caf50",DECLINED:"#e63946"};

    let _fid=0;
    const newFilament=()=>({id:++_fid,label:"",spoolCost:"",spoolWeight:1000,gramsUsed:""});
    const fmt=(v)=>`R${v.toFixed(2)}`;
    const toHrs=(h,m)=>(parseFloat(h)||0)+(parseFloat(m)||0)/60;

    const IS={width:"100%",background:"#111",border:"1px solid #333",color:"#e0e0e0",padding:"10px 12px",fontSize:14,fontFamily:"'IBM Plex Mono','Courier New',monospace",borderRadius:4,boxSizing:"border-box",outline:"none",WebkitAppearance:"none"};
    const SS={...IS,cursor:"pointer",appearance:"none"};
    const CL={display:"flex",alignItems:"center",gap:10,cursor:"pointer",color:"#aaa",fontSize:13,marginBottom:10};
    const CB={width:18,height:18,accentColor:"#e63946",flexShrink:0};

    const SH=({children,gold})=><div style={{marginTop:14,marginBottom:8,color:gold?"#b48c3c":"#e63946",fontSize:10,letterSpacing:2}}>-- {children}</div>;
    const Fld=({label,hint,children})=>(
      <div style={{marginBottom:18}}>
        {label&&<label style={{display:"block",color:"#888",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>{label}</label>}
        {hint&&<div style={{color:"#555",fontSize:11,marginBottom:6}}>{hint}</div>}
        {children}
      </div>
    );
    const HM=({hVal,hSet,mVal,mSet})=>(
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><label style={{display:"block",color:"#888",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>Hours</label><input style={IS} type="number" inputMode="decimal" value={hVal} onChange={e=>hSet(e.target.value)} placeholder="hrs" min="0"/></div>
        <div><label style={{display:"block",color:"#888",fontSize:11,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>Minutes</label><input style={IS} type="number" inputMode="decimal" value={mVal} onChange={e=>mSet(e.target.value)} placeholder="min" min="0" max="59"/></div>
      </div>
    );
    const Row=({label,sub,value,highlight,gold})=>(
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"10px 0",borderBottom:"1px solid #222"}}>
        <div style={{flex:1,paddingRight:12}}>
          <div style={{color:highlight?"#e63946":gold?"#b48c3c":"#aaa",fontSize:13,letterSpacing:1,textTransform:"uppercase"}}>{label}</div>
          {sub&&<div style={{color:"#555",fontSize:11,marginTop:2}}>{sub}</div>}
        </div>
        <div style={{color:highlight?"#e63946":gold?"#b48c3c":"#e0e0e0",fontFamily:"monospace",fontSize:15,fontWeight:700,whiteSpace:"nowrap"}}>{value}</div>
      </div>
    );

    // PDF helpers
    const pdfSec=(doc,y,M,W,title,gold)=>{
      const r=gold?[180,140,60]:[230,57,70];
      doc.setFillColor(...r);doc.rect(M,y,W-M*2,8,"F");
      doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(gold?20:255,gold?20:255,gold?20:255);
      doc.text(title,M+4,y+5.5);return y+11;
    };
    const pdfLn=(doc,y,M,W,c2,label,sub,value,shade)=>{
      const rH=sub?14:10;
      if(shade){doc.setFillColor(249,249,249);doc.rect(M,y,W-M*2,rH,"F");}
      doc.setFont("helvetica","bold");doc.setFontSize(8.5);doc.setTextColor(40,40,40);doc.text(label,M+4,y+6);
      if(sub){doc.setFont("helvetica","normal");doc.setFontSize(6.8);doc.setTextColor(150,150,150);doc.text(sub,M+4,y+11);}
      doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(30,30,30);doc.text(value,c2,y+6,{align:"right"});
      doc.setDrawColor(235,235,235);doc.line(M,y+rH,W-M,y+rH);
      return y+rH+1;
    };

    function App(){
      const[clientName,setClientName]=useState("");
      const[jobDesc,setJobDesc]=useState("");
      const[jobDate,setJobDate]=useState(new Date().toISOString().slice(0,10));
      const[filaments,setFilaments]=useState([newFilament()]);
      const addF=()=>setFilaments(f=>[...f,newFilament()]);
      const removeF=(id)=>setFilaments(f=>f.filter(x=>x.id!==id));
      const updateF=(id,k,v)=>setFilaments(f=>f.map(x=>x.id===id?{...x,[k]:v}:x));
      const[machine,setMachine]=useState("k1c");
      const[printHours,setPrintHours]=useState("");
      const[printMinutes,setPrintMinutes]=useState("");
      const[dryingEnabled,setDryingEnabled]=useState(false);
      const[dryHours,setDryHours]=useState("");
      const[customText,setCustomText]=useState(false);
      const[customTextH,setCustomTextH]=useState("");
      const[customTextM,setCustomTextM]=useState("");
      const[customLogo,setCustomLogo]=useState(false);
      const[customLogoH,setCustomLogoH]=useState("");
      const[customLogoM,setCustomLogoM]=useState("");
      const[colourMatch,setColourMatch]=useState(false);
      const[testSpoolCost,setTestSpoolCost]=useState("");
      const[testSpoolWeight,setTestSpoolWeight]=useState(1000);
      const[testGrams,setTestGrams]=useState("");
      const[testPrintH,setTestPrintH]=useState("");
      const[testPrintM,setTestPrintM]=useState("");
      const[otherCost,setOtherCost]=useState("");
      const[bulkEnabled,setBulkEnabled]=useState(false);
      const[bulkQty,setBulkQty]=useState("");
      const[bulkDiscountPct,setBulkDiscountPct]=useState("");
      const[markupMultiplier,setMarkupMultiplier]=useState(2.5);
      const[riskLevel,setRiskLevel]=useState(1);
      const[urgentEnabled,setUrgentEnabled]=useState(false);
      const[finish,setFinish]=useState("cleaned");
      const[cadHours,setCadHours]=useState("");
      const[cadMinutes,setCadMinutes]=useState("");
      const[opsHours,setOpsHours]=useState("");
      const[opsMinutes,setOpsMinutes]=useState("");
      const[quoteNotes,setQuoteNotes]=useState("");
      const[deliveryCost,setDeliveryCost]=useState("");
      const[quoteExpiry,setQuoteExpiry]=useState(7);
      const[quoteRefOverride,setQuoteRefOverride]=useState("");
      const[quoteHistory,setQuoteHistory]=useState([]);
      const[showHistory,setShowHistory]=useState(false);
      const[historyExpanded,setHistoryExpanded]=useState(null);

      useEffect(()=>{try{const s=localStorage.getItem("solidus_quotes");if(s)setQuoteHistory(JSON.parse(s));}catch(e){}}, []);

      const saveToHistory=(snap)=>{
        const upd=[snap,...quoteHistory].slice(0,50);
        setQuoteHistory(upd);
        try{localStorage.setItem("solidus_quotes",JSON.stringify(upd));}catch(e){}
      };
      const updateStatus=(id,status)=>{
        const upd=quoteHistory.map(q=>q.id===id?{...q,status}:q);
        setQuoteHistory(upd);
        try{localStorage.setItem("solidus_quotes",JSON.stringify(upd));}catch(e){}
      };
      const deleteQuote=(id)=>{
        const upd=quoteHistory.filter(q=>q.id!==id);
        setQuoteHistory(upd);
        try{localStorage.setItem("solidus_quotes",JSON.stringify(upd));}catch(e){}
      };

      // Calculations
      const totalPrintHours=toHrs(printHours,printMinutes);
      const filamentCosts=filaments.map(f=>{
        const cpg=(f.spoolCost&&f.spoolWeight)?parseFloat(f.spoolCost)/parseFloat(f.spoolWeight):0;
        const grams=parseFloat(f.gramsUsed)||0;
        const wc=detectWearClass(f.label);
        return{...f,cpg,cost:cpg*grams,grams,wearClass:wc};
      });
      const totalMaterialCost=filamentCosts.reduce((s,f)=>s+f.cost,0);
      const nozzleWearCost=filamentCosts.reduce((s,f)=>s+f.grams*WEAR[f.wearClass].nozzle_per_g,0);
      const highestWC=Math.max(...filamentCosts.map(f=>f.wearClass),1);
      const peiWearCost=totalPrintHours*WEAR[highestWC].pei_per_hr;
      const machineElec=MACHINES[machine].rate*totalPrintHours;
      const wsElec=WORKSTATION_RATE*totalPrintHours;
      const dryerElec=dryingEnabled?DRYER_RATE*(parseFloat(dryHours)||0):0;
      const testCpg=(testSpoolCost&&testSpoolWeight)?parseFloat(testSpoolCost)/parseFloat(testSpoolWeight):0;
      const testPH=toHrs(testPrintH,testPrintM);
      const colourMatchCost=colourMatch?testCpg*(parseFloat(testGrams)||0)+(MACHINES[machine].rate+WORKSTATION_RATE)*testPH:0;
      const extraCost=parseFloat(otherCost)||0;

      // Hard production costs (no labour)
      const perUnitCosts=totalMaterialCost+machineElec+wsElec+nozzleWearCost+peiWearCost+extraCost;
      const oneTimeCosts=dryerElec+colourMatchCost;
      const singleUnitCost=perUnitCosts+oneTimeCosts;
      const qty=parseInt(bulkQty)||1;
      const suggestedTier=getSuggestedTier(qty);
      const appliedDiscount=bulkEnabled?(bulkDiscountPct!==""?parseFloat(bulkDiscountPct):suggestedTier.pct):0;
      const discountAmount=bulkEnabled?(perUnitCosts*qty)*(appliedDiscount/100):0;
      const totalRunCost=bulkEnabled?(perUnitCosts*qty)-discountAmount+oneTimeCosts:singleUnitCost;
      const costPerUnit=bulkEnabled&&qty>0?totalRunCost/qty:singleUnitCost;
      const displayTotal=totalRunCost;

      // Quote calcs
      const getMuxTier=(m)=>MARKUP_TIERS.find(t=>m>=t.min&&m<=t.max)||MARKUP_TIERS[1];
      const currentMuxTier=getMuxTier(markupMultiplier);
      const currentRisk=RISK_LEVELS[riskLevel-1];
      const finishLabour=FINISH_MULTIPLIERS[finish].labour*FINISH_RATE_MIN;
      const cadLabour=toHrs(cadHours,cadMinutes)*CAD_RATE;
      const opsLabour=toHrs(opsHours,opsMinutes)*OPS_RATE;
      const customTextLabour=customText?toHrs(customTextH,customTextM)*CAD_RATE:0;
      const customLogoLabour=customLogo?toHrs(customLogoH,customLogoM)*CAD_RATE:0;
      const totalLabour=finishLabour+cadLabour+opsLabour+customTextLabour+customLogoLabour;
      const urgentSurcharge=urgentEnabled?displayTotal*0.5:0;
      const productionPlusUrgent=displayTotal+urgentSurcharge;
      const quotedBase=productionPlusUrgent*markupMultiplier;
      const riskBuffer=quotedBase*(currentRisk.bufferPct/100);
      const deliveryCostVal=parseFloat(deliveryCost)||0;
      const finalQuotePrice=quotedBase+riskBuffer+totalLabour+deliveryCostVal;
      const finalPricePerUnit=bulkEnabled&&qty>1?finalQuotePrice/qty:finalQuotePrice;
      const profitAmount=finalQuotePrice-displayTotal-totalLabour;
      const marginPct=displayTotal>0?((profitAmount/displayTotal)*100).toFixed(1):"--";
      const quoteRef=quoteRefOverride.trim()||("SLD-"+(jobDate||"").replace(/-/g,"")+"-"+(clientName||"Q").substring(0,3).toUpperCase());

      const loadPDF=(fn)=>{
        if(window.jspdf){fn();return;}
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
        s.onload=()=>setTimeout(fn,100);
        s.onerror=()=>alert("PDF library failed to load.");
        document.head.appendChild(s);
      };

      const generatePDF=(type)=>{
        if(!window.jspdf){alert("PDF not loaded.");return;}
        const{jsPDF}=window.jspdf;
        const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
        const W=210,M=18,c2=192;let y=0;
        const isJS=type==="jobsheet";
        doc.setFillColor(18,18,18);doc.rect(0,0,W,30,"F");
        doc.setFillColor(230,57,70);doc.rect(0,30,W,1.5,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(17);doc.setTextColor(255,255,255);doc.text("SOLIDUS",M,14);
        doc.setFontSize(7.5);doc.setFont("helvetica","normal");doc.setTextColor(130,130,130);
        doc.text("FDM PRODUCTION COST SYSTEM  \u00B7  CODEX REV 3.1  \u00B7  R"+KWH_RATE+"/kWh",M+40,14);
        doc.setFillColor(isJS?50:230,isJS?50:57,isJS?50:70);
        doc.roundedRect(W-M-44,7,44,15,2,2,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(220,220,220);
        doc.text(isJS?"JOB SHEET":"COST REPORT",W-M-22,16,{align:"center"});
        y=40;
        doc.setFillColor(247,247,247);doc.roundedRect(M,y,W-M*2,30,2,2,"F");
        doc.setDrawColor(220,220,220);doc.roundedRect(M,y,W-M*2,30,2,2,"S");
        [["CLIENT",clientName||"--"],["JOB",jobDesc||"--"],["DATE",jobDate||"--"]].forEach(([l,v],i)=>{
          doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(180,60,70);doc.text(l,M+5,y+9+i*8);
          doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(30,30,30);doc.text(String(v),M+24,y+9+i*8);
        });
        y+=38;
        y=pdfSec(doc,y,M,W,"ELECTRICITY");let sh=false;
        y=pdfLn(doc,y,M,W,c2,"Machine -- "+MACHINES[machine].label,totalPrintHours.toFixed(2)+"h x R"+MACHINES[machine].rate.toFixed(2)+"/hr",fmt(machineElec),sh);sh=!sh;
        y=pdfLn(doc,y,M,W,c2,"Workstation",totalPrintHours.toFixed(2)+"h x R"+WORKSTATION_RATE.toFixed(2)+"/hr",fmt(wsElec),sh);sh=!sh;
        if(dryingEnabled){y=pdfLn(doc,y,M,W,c2,"Dryer [one-time]",(dryHours||0)+"h x R"+DRYER_RATE.toFixed(2)+"/hr",fmt(dryerElec),sh);}
        y+=3;
        y=pdfSec(doc,y,M,W,"MATERIAL"+(filaments.length>1?" ("+filaments.length+" FILAMENTS)":""));sh=false;
        filamentCosts.forEach((f,i)=>{y=pdfLn(doc,y,M,W,c2,f.label||"Filament "+(i+1),f.grams+"g @ R"+f.cpg.toFixed(4)+"/g -- "+WEAR[f.wearClass].label,fmt(f.cost),i%2===1);});
        if(filaments.length>1)y=pdfLn(doc,y,M,W,c2,"TOTAL MATERIAL","",fmt(totalMaterialCost),false);
        y+=3;
        y=pdfSec(doc,y,M,W,"CONSUMABLES (AUTO)");sh=false;
        y=pdfLn(doc,y,M,W,c2,"Nozzle Wear","Material class detection: "+filamentCosts.map(f=>WEAR[f.wearClass].label).join(", "),fmt(nozzleWearCost),sh);sh=!sh;
        y=pdfLn(doc,y,M,W,c2,"PEI Plate Wear",totalPrintHours.toFixed(2)+"h x R"+WEAR[highestWC].pei_per_hr+"/hr ("+WEAR[highestWC].label+")",fmt(peiWearCost),sh);
        if(extraCost>0){sh=!sh;y=pdfLn(doc,y,M,W,c2,"Other Costs","",fmt(extraCost),sh);}
        if(colourMatchCost>0){sh=!sh;y=pdfLn(doc,y,M,W,c2,"Colour Match [one-time]","Material + machine",fmt(colourMatchCost),sh);}
        y+=3;
        if(bulkEnabled&&qty>1){
          y=pdfSec(doc,y,M,W,"BULK ORDER -- "+qty+" UNITS");
          y=pdfLn(doc,y,M,W,c2,"Per-Unit x "+qty,"",fmt(perUnitCosts*qty),false);
          if(oneTimeCosts>0)y=pdfLn(doc,y,M,W,c2,"One-Time Costs","",fmt(oneTimeCosts),true);
          if(discountAmount>0)y=pdfLn(doc,y,M,W,c2,"Bulk Discount "+appliedDiscount+"%","","-"+fmt(discountAmount),false);
          y+=3;
        }
        doc.setFillColor(18,18,18);doc.roundedRect(M,y,W-M*2,22,2,2,"F");
        doc.setFillColor(230,57,70);doc.rect(M,y,2,22,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(200,200,200);
        doc.text("TOTAL PRODUCTION COST -- HARD COSTS, NO LABOUR",M+7,y+9);
        doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor(90,90,90);
        doc.text("Labour charged separately in quote  \u00B7  Codex Rev 3.1",M+7,y+16);
        doc.setFont("helvetica","bold");doc.setFontSize(20);doc.setTextColor(230,57,70);
        doc.text(fmt(displayTotal),c2,y+14,{align:"right"});
        y+=30;
        doc.setDrawColor(220,220,220);doc.line(M,y,W-M,y);y+=5;
        doc.setFont("helvetica","normal");doc.setFontSize(6.5);doc.setTextColor(170,170,170);
        doc.text("Solidus  \u00B7  "+(isJS?"Job Sheet":"Cost Report")+"  \u00B7  "+new Date().toLocaleString(),M,y);
        const sn=(clientName||"job").replace(/[^a-zA-Z0-9]/g,"_");
        doc.save("Solidus_"+(isJS?"JobSheet":"CostReport")+"_"+sn+"_"+(jobDate||"today")+".pdf");
      };

      const generateInternalQuote=()=>{
        if(!window.jspdf){alert("PDF not loaded.");return;}
        const{jsPDF}=window.jspdf;
        const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
        const W=210,M=18,c2=192;let y=0;
        doc.setFillColor(18,18,18);doc.rect(0,0,W,30,"F");
        doc.setFillColor(230,57,70);doc.rect(0,30,W,1.5,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(17);doc.setTextColor(255,255,255);doc.text("SOLIDUS",M,14);
        doc.setFontSize(7.5);doc.setFont("helvetica","normal");doc.setTextColor(130,130,130);doc.text("INTERNAL QUOTE -- CONFIDENTIAL",M+40,14);
        doc.setFillColor(50,50,50);doc.roundedRect(W-M-52,7,52,15,2,2,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(200,200,200);doc.text("INTERNAL COPY",W-M-26,16,{align:"center"});
        y=40;
        doc.setFillColor(247,247,247);doc.roundedRect(M,y,W-M*2,30,2,2,"F");
        doc.setDrawColor(220,220,220);doc.roundedRect(M,y,W-M*2,30,2,2,"S");
        [["CLIENT",clientName||"--"],["JOB",jobDesc||"--"],["DATE",jobDate||"--"]].forEach(([l,v],i)=>{
          doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(180,60,70);doc.text(l,M+5,y+9+i*8);
          doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(30,30,30);doc.text(String(v),M+24,y+9+i*8);
        });
        doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(180,60,70);doc.text("QUOTE REF",W-M-40,y+9);
        doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(30,30,30);doc.text(quoteRef,W-M-40,y+17);
        y+=38;
        y=pdfSec(doc,y,M,W,"PRODUCTION COST -- HARD COSTS ONLY");let sh=false;
        filamentCosts.forEach((f,i)=>{y=pdfLn(doc,y,M,W,c2,f.label||"Filament "+(i+1),f.grams+"g @ R"+f.cpg.toFixed(4)+"/g",fmt(f.cost),i%2===1);});
        if(filaments.length>1){y=pdfLn(doc,y,M,W,c2,"Total Material","",fmt(totalMaterialCost),false);sh=true;}
        y=pdfLn(doc,y,M,W,c2,"Machine Electricity",totalPrintHours.toFixed(2)+"h x R"+MACHINES[machine].rate.toFixed(2)+"/hr",fmt(machineElec),sh);sh=!sh;
        y=pdfLn(doc,y,M,W,c2,"Workstation Electricity",totalPrintHours.toFixed(2)+"h x R"+WORKSTATION_RATE.toFixed(2)+"/hr",fmt(wsElec),sh);sh=!sh;
        if(dryingEnabled){y=pdfLn(doc,y,M,W,c2,"Dryer [one-time]",(dryHours||0)+"h x R"+DRYER_RATE.toFixed(2)+"/hr",fmt(dryerElec),sh);sh=!sh;}
        y=pdfLn(doc,y,M,W,c2,"Nozzle Wear (auto)",WEAR[highestWC].label,fmt(nozzleWearCost),sh);sh=!sh;
        y=pdfLn(doc,y,M,W,c2,"PEI Plate Wear (auto)",totalPrintHours.toFixed(2)+"h x R"+WEAR[highestWC].pei_per_hr+"/hr",fmt(peiWearCost),sh);sh=!sh;
        if(extraCost>0){y=pdfLn(doc,y,M,W,c2,"Other Costs","",fmt(extraCost),sh);sh=!sh;}
        if(colourMatchCost>0){y=pdfLn(doc,y,M,W,c2,"Colour Match [one-time]","",fmt(colourMatchCost),sh);sh=!sh;}
        if(bulkEnabled&&qty>1){
          y=pdfLn(doc,y,M,W,c2,"Per-Unit x "+qty,"",fmt(perUnitCosts*qty),sh);sh=!sh;
          if(discountAmount>0){y=pdfLn(doc,y,M,W,c2,"Bulk Discount "+appliedDiscount+"%","","-"+fmt(discountAmount),sh);sh=!sh;}
        }
        y=pdfLn(doc,y,M,W,c2,"TOTAL HARD COSTS","",fmt(displayTotal),false);y+=4;
        y=pdfSec(doc,y,M,W,"QUOTE PRICING");sh=false;
        if(urgentSurcharge>0){y=pdfLn(doc,y,M,W,c2,"Urgent Surcharge (+50%)","Added before markup",fmt(urgentSurcharge),sh);sh=!sh;}
        if(urgentSurcharge>0){y=pdfLn(doc,y,M,W,c2,"Production + Urgent","Base for markup",fmt(productionPlusUrgent),sh);sh=!sh;}
        y=pdfLn(doc,y,M,W,c2,"Marked-up Base (x"+markupMultiplier+")",currentMuxTier.label,fmt(quotedBase),sh);sh=!sh;
        if(riskBuffer>0){y=pdfLn(doc,y,M,W,c2,"Risk Buffer "+currentRisk.bufferPct+"% -- Level "+riskLevel+" "+currentRisk.label,"",fmt(riskBuffer),sh);}
        y+=4;
        y=pdfSec(doc,y,M,W,"YOUR LABOUR (NOT MARKED UP)");sh=false;
        if(finishLabour>0){y=pdfLn(doc,y,M,W,c2,"Post-Processing -- "+FINISH_MULTIPLIERS[finish].label,FINISH_MULTIPLIERS[finish].labour+" min x R180/hr",fmt(finishLabour),sh);sh=!sh;}
        if(cadLabour>0){y=pdfLn(doc,y,M,W,c2,"CAD / Design Time",toHrs(cadHours,cadMinutes).toFixed(2)+"h x R"+CAD_RATE+"/hr",fmt(cadLabour),sh);sh=!sh;}
        if(opsLabour>0){y=pdfLn(doc,y,M,W,c2,"Operational / Setup",toHrs(opsHours,opsMinutes).toFixed(2)+"h x R"+OPS_RATE+"/hr",fmt(opsLabour),sh);sh=!sh;}
        if(customTextLabour>0){y=pdfLn(doc,y,M,W,c2,"Custom Text Prep",toHrs(customTextH,customTextM).toFixed(2)+"h x R"+CAD_RATE+"/hr",fmt(customTextLabour),sh);sh=!sh;}
        if(customLogoLabour>0){y=pdfLn(doc,y,M,W,c2,"Logo/Artwork Prep",toHrs(customLogoH,customLogoM).toFixed(2)+"h x R"+CAD_RATE+"/hr",fmt(customLogoLabour),sh);sh=!sh;}
        if(totalLabour===0)y=pdfLn(doc,y,M,W,c2,"No labour entered","",fmt(0),false);
        if(deliveryCostVal>0){y=pdfLn(doc,y,M,W,c2,"Delivery (pass-through)","",fmt(deliveryCostVal),sh);}
        y+=4;
        doc.setFillColor(18,18,18);doc.roundedRect(M,y,W-M*2,28,2,2,"F");
        doc.setFillColor(230,57,70);doc.rect(M,y,2,28,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(200,200,200);
        doc.text(bulkEnabled&&qty>1?"FINAL QUOTE -- "+qty+" UNITS":"FINAL QUOTE PRICE",M+7,y+9);
        doc.setFontSize(7.5);doc.setTextColor(120,120,120);
        doc.text("Markup: x"+markupMultiplier+"  \u00B7  Risk "+riskLevel+" ("+currentRisk.bufferPct+"%)  \u00B7  Profit: "+fmt(profitAmount)+"  \u00B7  Margin: "+marginPct+"%",M+7,y+16);
        doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor(90,90,90);
        doc.text("Valid "+quoteExpiry+" days  \u00B7  Labour: "+fmt(totalLabour)+"  \u00B7  Delivery: "+fmt(deliveryCostVal),M+7,y+22);
        doc.setFont("helvetica","bold");doc.setFontSize(20);doc.setTextColor(230,57,70);
        doc.text(fmt(finalQuotePrice),c2,y+17,{align:"right"});
        y+=36;
        if(quoteNotes.trim()){
          doc.setFillColor(255,248,240);doc.roundedRect(M,y,W-M*2,22,2,2,"F");
          doc.setFillColor(230,57,70);doc.rect(M,y,2,22,"F");
          doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(180,60,70);doc.text("QUOTE NOTES (INTERNAL)",M+5,y+7);
          doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(60,60,60);
          const nl=doc.splitTextToSize(quoteNotes,W-M*2-12);doc.text(nl,M+5,y+14);
          y+=Math.max(22,nl.length*5+12)+4;
        }
        doc.setDrawColor(220,220,220);doc.line(M,y,W-M,y);y+=5;
        doc.setFont("helvetica","normal");doc.setFontSize(6.5);doc.setTextColor(170,170,170);
        doc.text("Solidus  \u00B7  INTERNAL QUOTE  \u00B7  "+quoteRef+"  \u00B7  "+new Date().toLocaleString(),M,y);
        doc.text("CONFIDENTIAL -- NOT FOR CLIENT DISTRIBUTION",c2,y,{align:"right"});
        const sn=(clientName||"client").replace(/[^a-zA-Z0-9]/g,"_");
        doc.save("Solidus_InternalQuote_"+sn+"_"+(jobDate||"today")+".pdf");
      };

      const generateCustomerQuote=()=>{
        if(!window.jspdf){alert("PDF not loaded.");return;}
        const{jsPDF}=window.jspdf;
        const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
        const W=210,M=18;let y=0;const G=[180,140,60];
        doc.setFillColor(18,18,18);doc.rect(0,0,W,32,"F");
        doc.setFillColor(...G);doc.rect(0,32,W,1.5,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(18);doc.setTextColor(255,255,255);doc.text("SOLIDUS",M,15);
        doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(140,140,140);doc.text("FDM MANUFACTURING & PRODUCTION SERVICES",M,23);
        doc.setFillColor(...G);doc.roundedRect(W-M-48,8,48,16,2,2,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(20,20,20);doc.text("QUOTATION",W-M-24,18,{align:"center"});
        y=44;
        doc.setFillColor(245,245,245);doc.rect(M,y,W-M*2,14,"F");
        doc.setDrawColor(220,220,220);doc.rect(M,y,W-M*2,14,"S");
        doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(150,110,40);
        doc.text("QUOTE REF",M+5,y+6);doc.text("DATE ISSUED",M+70,y+6);doc.text("VALID UNTIL",M+135,y+6);
        doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor(30,30,30);
        doc.text(quoteRef,M+5,y+12);
        doc.text(jobDate||new Date().toISOString().slice(0,10),M+70,y+12);
        const vd=new Date(jobDate||new Date());vd.setDate(vd.getDate()+quoteExpiry);
        doc.text(vd.toISOString().slice(0,10),M+135,y+12);
        y+=22;
        doc.setFillColor(250,250,250);doc.roundedRect(M,y,W-M*2,26,2,2,"F");
        doc.setDrawColor(230,230,230);doc.roundedRect(M,y,W-M*2,26,2,2,"S");
        doc.setFillColor(...G);doc.rect(M,y,2,26,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(7);doc.setTextColor(150,110,40);doc.text("PREPARED FOR",M+6,y+8);
        doc.setFont("helvetica","bold");doc.setFontSize(11);doc.setTextColor(30,30,30);doc.text(clientName||"\u2014",M+6,y+17);
        if(jobDesc){doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(100,100,100);doc.text("Re: "+jobDesc,M+6,y+23);}
        y+=34;
        doc.setFillColor(18,18,18);doc.rect(M,y,W-M*2,9,"F");doc.setFillColor(...G);doc.rect(M,y,2,9,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(255,255,255);doc.text("SCOPE OF WORK",M+6,y+6.2);y+=13;
        const sr=[
          ["Material",filaments.map((f,i)=>f.label||"Filament "+(i+1)).join(", ")||"\u2014"],
          ["Machine Platform",MACHINES[machine].label],
          ["Surface Finish",FINISH_MULTIPLIERS[finish].label],
        ];
        if(bulkEnabled&&qty>1)sr.push(["Order Quantity",qty+" units"]);
        if(urgentEnabled)sr.push(["Turnaround","URGENT \u2014 P1 Priority"]);
        const ci=[];if(customText)ci.push("Custom text/naming");if(customLogo)ci.push("Logo/artwork");if(colourMatch)ci.push("Colour matching");
        if(ci.length>0)sr.push(["Customisation",ci.join(", ")]);
        if(dryingEnabled)sr.push(["Material Prep","Pre-print drying protocol"]);
        sr.forEach(([l,v],i)=>{
          if(i%2===1){doc.setFillColor(248,248,248);doc.rect(M,y,W-M*2,11,"F");}
          doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(110,110,110);doc.text(l,M+5,y+7.5);
          doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor(30,30,30);doc.text(String(v),M+58,y+7.5);
          doc.setDrawColor(235,235,235);doc.line(M,y+11,W-M,y+11);y+=12;
        });
        y+=10;
        doc.setFillColor(18,18,18);doc.roundedRect(M,y,W-M*2,38,3,3,"F");
        doc.setFillColor(...G);doc.rect(M,y,3,38,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(160,160,160);
        doc.text(bulkEnabled&&qty>1?"TOTAL QUOTED PRICE \u2014 "+qty+" UNITS":"TOTAL QUOTED PRICE",M+9,y+11);
        doc.setFont("helvetica","bold");doc.setFontSize(26);doc.setTextColor(...G);
        doc.text(fmt(finalQuotePrice),W-M-5,y+26,{align:"right"});
        if(bulkEnabled&&qty>1){doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(120,120,120);doc.text(fmt(finalPricePerUnit)+" per unit",W-M-5,y+34,{align:"right"});}
        y+=46;
        doc.setFillColor(245,245,245);doc.roundedRect(M,y,W-M*2,34,2,2,"F");
        doc.setDrawColor(220,220,220);doc.roundedRect(M,y,W-M*2,34,2,2,"S");
        doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(150,110,40);doc.text("PAYMENT & TERMS",M+5,y+8);
        const dep=bulkEnabled||urgentEnabled;
        const terms=[
          dep?"50% deposit required before production commences.":"Payment due on collection or delivery.",
          "Balance due on collection or delivery of completed parts.",
          "EFT preferred. Quote valid for "+quoteExpiry+" days from date of issue.",
          "Subject to Solidus Manufacturing Terms & Conditions.",
        ];
        doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.setTextColor(60,60,60);
        terms.forEach((t,i)=>doc.text("\u2022 "+t,M+5,y+15+i*5.5));
        y+=42;
        doc.setDrawColor(210,210,210);doc.line(M,y,W-M,y);y+=5;
        doc.setFont("helvetica","normal");doc.setFontSize(6.5);doc.setTextColor(160,160,160);
        doc.text("Solidus  \u00B7  "+quoteRef+"  \u00B7  "+new Date().toLocaleString(),M,y);
        doc.text("This quotation does not constitute a tax invoice.",W-M,y,{align:"right"});
        const sn=(clientName||"client").replace(/[^a-zA-Z0-9]/g,"_");
        doc.save("Solidus_Quote_"+sn+"_"+(jobDate||"today")+".pdf");
        saveToHistory({id:Date.now(),date:jobDate||new Date().toISOString().slice(0,10),clientName:clientName||"Unknown",jobDesc:jobDesc||"--",quoteRef,finalQuotePrice,productionCost:displayTotal,status:"PENDING"});
      };

      const resetAll=()=>{
        if(!window.confirm("Reset all fields? This cannot be undone."))return;
        setClientName("");setJobDesc("");setJobDate(new Date().toISOString().slice(0,10));
        setFilaments([newFilament()]);setMachine("k1c");setPrintHours("");setPrintMinutes("");
        setDryingEnabled(false);setDryHours("");
        setCustomText(false);setCustomTextH("");setCustomTextM("");
        setCustomLogo(false);setCustomLogoH("");setCustomLogoM("");
        setColourMatch(false);setTestSpoolCost("");setTestGrams("");setTestPrintH("");setTestPrintM("");
        setOtherCost("");setBulkEnabled(false);setBulkQty("");setBulkDiscountPct("");
        setMarkupMultiplier(2.5);setRiskLevel(1);setUrgentEnabled(false);
        setFinish("cleaned");setCadHours("");setCadMinutes("");setOpsHours("");setOpsMinutes("");
        setQuoteNotes("");setDeliveryCost("");setQuoteExpiry(7);setQuoteRefOverride("");
      };

      const BB={flex:1,padding:"14px 8px",border:"none",borderRadius:4,fontSize:11,fontWeight:700,fontFamily:"monospace",letterSpacing:1,cursor:"pointer",textTransform:"uppercase"};

      return(
        <div style={{minHeight:"100vh",background:"#0a0a0a",fontFamily:"'IBM Plex Mono','Courier New',monospace",color:"#e0e0e0",paddingBottom:80}}>

          {/* Header */}
          <div style={{background:"#0f0f0f",borderBottom:"2px solid #e63946",padding:"20px 20px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
              <div style={{background:"#e63946",color:"#fff",fontWeight:900,fontSize:11,padding:"3px 8px",letterSpacing:2}}>SOLIDUS</div>
              <div style={{color:"#444",fontSize:11,letterSpacing:1}}>PRODUCTION COST SYSTEM</div>
            </div>
            <div style={{color:"#666",fontSize:9,letterSpacing:1}}>CODEX REV 3.1 · R{KWH_RATE}/kWh · K1C {K1C_WATTS}W · K2+ {K2_WATTS}W · DRYER {DRYER_WATTS}W · WS {WORKSTATION_WATTS}W</div>
          </div>

          <div style={{padding:"0 16px",maxWidth:560,margin:"0 auto"}}>

            {/* JOB INFO */}
            <SH>JOB INFORMATION</SH>
            <Fld label="Client Name"><input style={IS} value={clientName} onChange={e=>setClientName(e.target.value)} placeholder="e.g. Acme Industries"/></Fld>
            <Fld label="Job Description"><input style={IS} value={jobDesc} onChange={e=>setJobDesc(e.target.value)} placeholder="e.g. PA6 bracket x 4"/></Fld>
            <Fld label="Date"><input style={IS} type="date" value={jobDate} onChange={e=>setJobDate(e.target.value)}/></Fld>

            {/* MATERIAL */}
            <SH>MATERIAL -- FILAMENTS</SH>
            {filaments.map((f,i)=>(
              <div key={f.id} style={{background:"#111",border:"1px solid #222",borderRadius:4,padding:"14px 14px 6px",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div>
                    <span style={{color:"#e63946",fontSize:10,letterSpacing:1.5}}>FILAMENT {i+1}</span>
                    {f.label&&<span style={{color:"#333",fontSize:9,marginLeft:8}}>· {WEAR[detectWearClass(f.label)].label}</span>}
                  </div>
                  {filaments.length>1&&<button onClick={()=>removeF(f.id)} style={{background:"none",border:"1px solid #333",color:"#555",fontSize:10,padding:"3px 10px",cursor:"pointer",borderRadius:3}}>REMOVE</button>}
                </div>
                <Fld label="Material Name" hint="Include CF, GF, ESD, FR in name for auto wear class detection">
                  <input style={IS} value={f.label} onChange={e=>updateF(f.id,"label",e.target.value)} placeholder="e.g. PLA Black, CF-PA6, TPU Blue"/>
                </Fld>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <Fld label="Spool Cost (R)"><input style={IS} type="number" inputMode="decimal" value={f.spoolCost} onChange={e=>updateF(f.id,"spoolCost",e.target.value)} placeholder="e.g. 350"/></Fld>
                  <Fld label="Spool Weight">
                    <select style={SS} value={f.spoolWeight} onChange={e=>updateF(f.id,"spoolWeight",e.target.value)}>
                      <option value={250}>250g</option><option value={500}>500g</option><option value={750}>750g</option><option value={1000}>1000g</option><option value={2000}>2000g</option>
                    </select>
                  </Fld>
                </div>
                <Fld label="Grams Used" hint="From slicer -- per unit">
                  <input style={IS} type="number" inputMode="decimal" value={f.gramsUsed} onChange={e=>updateF(f.id,"gramsUsed",e.target.value)} placeholder="e.g. 45"/>
                </Fld>
                {f.spoolCost&&f.gramsUsed&&<div style={{color:"#555",fontSize:11,marginBottom:10,textAlign:"right"}}>Cost: <span style={{color:"#888"}}>{fmt(filamentCosts[i]?.cost||0)}</span><span style={{color:"#333",marginLeft:8}}>@ R{filamentCosts[i]?.cpg.toFixed(4)}/g</span></div>}
              </div>
            ))}
            <button onClick={addF} style={{width:"100%",padding:"12px",background:"none",border:"1px dashed #333",color:"#555",fontSize:11,letterSpacing:1.5,cursor:"pointer",borderRadius:4,marginBottom:18,textTransform:"uppercase"}}>+ Add Filament</button>

            {/* MACHINE */}
            <SH>MACHINE & ELECTRICITY</SH>
            <Fld label="Machine">
              <select style={SS} value={machine} onChange={e=>setMachine(e.target.value)}>
                {Object.entries(MACHINES).map(([k,v])=><option key={k} value={k}>{v.label} -- R{v.rate.toFixed(2)}/hr</option>)}
              </select>
            </Fld>
            <Fld label="Print Time -- Per Unit"><HM hVal={printHours} hSet={setPrintHours} mVal={printMinutes} mSet={setPrintMinutes}/></Fld>

            {/* DRYING */}
            <SH>DRYING (SPACEPI X4) -- ONE-TIME PER BATCH</SH>
            <Fld label="">
              <label style={CL}><input type="checkbox" checked={dryingEnabled} onChange={e=>setDryingEnabled(e.target.checked)} style={CB}/>Drying required (R{DRYER_RATE.toFixed(2)}/hr)</label>
            </Fld>
            {dryingEnabled&&<Fld label="Drying Duration (hours)" hint="Codex S10 -- PA6 = 8-12hrs, PETG = 4-6hrs"><input style={IS} type="number" inputMode="decimal" value={dryHours} onChange={e=>setDryHours(e.target.value)} placeholder="e.g. 8"/></Fld>}

            {/* CUSTOMISATION */}
            <SH>CUSTOMISATION / PERSONALISATION</SH>
            <Fld label=""><label style={CL}><input type="checkbox" checked={customText} onChange={e=>setCustomText(e.target.checked)} style={CB}/>Custom text / names / numbers</label></Fld>
            {customText&&<Fld label="CAD prep time -- charged as labour in quote (R150/hr)"><HM hVal={customTextH} hSet={setCustomTextH} mVal={customTextM} mSet={setCustomTextM}/></Fld>}
            <Fld label=""><label style={CL}><input type="checkbox" checked={customLogo} onChange={e=>setCustomLogo(e.target.checked)} style={CB}/>Logo or artwork embedded</label></Fld>
            {customLogo&&<Fld label="File prep time -- charged as labour in quote (R150/hr)"><HM hVal={customLogoH} hSet={setCustomLogoH} mVal={customLogoM} mSet={setCustomLogoM}/></Fld>}
            <Fld label=""><label style={{...CL,marginBottom:0}}><input type="checkbox" checked={colourMatch} onChange={e=>setColourMatch(e.target.checked)} style={CB}/>Colour matching -- test print required</label></Fld>
            {colourMatch&&(
              <div style={{background:"#111",border:"1px solid #222",borderRadius:4,padding:"14px 14px 6px",marginTop:10,marginBottom:12}}>
                <div style={{color:"#555",fontSize:10,letterSpacing:1,marginBottom:12}}>TEST PRINT -- HARD COST (MATERIAL + MACHINE TIME)</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <Fld label="Test Spool Cost (R)"><input style={IS} type="number" inputMode="decimal" value={testSpoolCost} onChange={e=>setTestSpoolCost(e.target.value)} placeholder="e.g. 350"/></Fld>
                  <Fld label="Spool Weight"><select style={SS} value={testSpoolWeight} onChange={e=>setTestSpoolWeight(e.target.value)}><option value={250}>250g</option><option value={500}>500g</option><option value={750}>750g</option><option value={1000}>1000g</option><option value={2000}>2000g</option></select></Fld>
                </div>
                <Fld label="Test Print Grams"><input style={IS} type="number" inputMode="decimal" value={testGrams} onChange={e=>setTestGrams(e.target.value)} placeholder="e.g. 12"/></Fld>
                <Fld label="Test Print Time"><HM hVal={testPrintH} hSet={setTestPrintH} mVal={testPrintM} mSet={setTestPrintM}/></Fld>
              </div>
            )}

            {/* OTHER */}
            <SH>OTHER COSTS</SH>
            <Fld label="Other Costs (R)" hint="Packaging, hardware -- per unit hard cost"><input style={IS} type="number" inputMode="decimal" value={otherCost} onChange={e=>setOtherCost(e.target.value)} placeholder="0.00"/></Fld>

            {/* BULK */}
            <SH>BULK ORDER</SH>
            <Fld label=""><label style={CL}><input type="checkbox" checked={bulkEnabled} onChange={e=>setBulkEnabled(e.target.checked)} style={CB}/>This is a bulk / repeat order</label></Fld>
            {bulkEnabled&&(
              <div style={{background:"#111",border:"1px solid #1e1e1e",borderLeft:"2px solid #e63946",borderRadius:4,padding:"16px 16px 8px",marginBottom:16}}>
                <Fld label="Quantity (units)"><input style={IS} type="number" inputMode="numeric" value={bulkQty} onChange={e=>{setBulkQty(e.target.value);setBulkDiscountPct("");}} placeholder="e.g. 50" min="1"/></Fld>
                {qty>1&&<div style={{marginBottom:16}}>
                  <div style={{color:"#555",fontSize:10,letterSpacing:1,marginBottom:8}}>SUGGESTED DISCOUNT TIERS</div>
                  {BULK_TIERS.map(t=>{const ia=qty>=t.min&&qty<=t.max;return<div key={t.min} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",marginBottom:4,borderRadius:3,background:ia?"#1a1a1a":"transparent",border:ia?"1px solid #e63946":"1px solid #1e1e1e"}}><span style={{color:ia?"#e0e0e0":"#444",fontSize:11}}>{t.label}</span><span style={{color:ia?"#e63946":"#333",fontSize:11,fontWeight:700}}>{t.pct}%</span></div>;})}
                </div>}
                <Fld label="Discount % (override)" hint={qty>1?`Suggested: ${suggestedTier.pct}%`:"Enter quantity first"}><input style={IS} type="number" inputMode="decimal" value={bulkDiscountPct} onChange={e=>setBulkDiscountPct(e.target.value)} placeholder={qty>1?`${suggestedTier.pct} (suggested)`:"e.g. 10"} min="0" max="100"/></Fld>
                {qty>1&&<div style={{color:"#555",fontSize:11,lineHeight:1.8,paddingBottom:8}}>
                  <span style={{color:"#333"}}>PER-UNIT x {qty}: </span><span style={{color:"#888"}}>{fmt(perUnitCosts*qty)}</span><br/>
                  {oneTimeCosts>0&&<><span style={{color:"#333"}}>ONE-TIME: </span><span style={{color:"#888"}}>{fmt(oneTimeCosts)}</span><br/></>}
                  {discountAmount>0&&<><span style={{color:"#333"}}>DISCOUNT ({appliedDiscount}%): </span><span style={{color:"#e63946"}}>-{fmt(discountAmount)}</span><br/></>}
                  <span style={{color:"#333"}}>COST PER UNIT: </span><span style={{color:"#e63946",fontWeight:700}}>{fmt(costPerUnit)}</span>
                </div>}
              </div>
            )}

            {/* PRODUCTION BREAKDOWN */}
            <div style={{marginTop:32,background:"#0f0f0f",border:"1px solid #222",borderTop:"2px solid #e63946",padding:"20px 16px 4px"}}>
              <div style={{color:"#e63946",fontSize:10,letterSpacing:2,marginBottom:12}}>-- PRODUCTION COST BREAKDOWN</div>
              {clientName&&<div style={{color:"#555",fontSize:11,marginBottom:16}}>CLIENT: <span style={{color:"#888"}}>{clientName}</span>{jobDesc&&<><br/>JOB: <span style={{color:"#888"}}>{jobDesc}</span></>}<br/>DATE: <span style={{color:"#888"}}>{jobDate}</span>{bulkEnabled&&qty>1&&<><br/>QTY: <span style={{color:"#e63946"}}>{qty} units</span></>}</div>}
              {filamentCosts.map((f,i)=><Row key={f.id} label={f.label||`Filament ${i+1}`} sub={f.spoolCost&&f.gramsUsed?`${f.gramsUsed}g @ R${f.cpg.toFixed(4)}/g`:"Enter spool cost + grams"} value={fmt(f.cost)}/>)}
              {filaments.length>1&&<Row label="Total Material" sub={`${filaments.length} filaments`} value={fmt(totalMaterialCost)}/>}
              <Row label="Machine Electricity" sub={`${totalPrintHours.toFixed(2)}h x R${MACHINES[machine].rate.toFixed(2)}/hr (${MACHINES[machine].watts}W)`} value={fmt(machineElec)}/>
              <Row label="Workstation Electricity" sub={`${totalPrintHours.toFixed(2)}h x R${WORKSTATION_RATE.toFixed(2)}/hr (${WORKSTATION_WATTS}W)`} value={fmt(wsElec)}/>
              {dryingEnabled&&<Row label="Dryer Electricity" sub={`${dryHours||0}h x R${DRYER_RATE.toFixed(2)}/hr${bulkEnabled&&qty>1?" · one-time per batch":""}`} value={fmt(dryerElec)}/>}
              <Row label="Nozzle Wear (auto)" sub={`${filamentCosts.map(f=>WEAR[f.wearClass].label).join(", ")} · auto from material`} value={fmt(nozzleWearCost)}/>
              <Row label="PEI Plate Wear (auto)" sub={`${totalPrintHours.toFixed(2)}h x R${WEAR[highestWC].pei_per_hr}/hr · ${WEAR[highestWC].label}`} value={fmt(peiWearCost)}/>
              {extraCost>0&&<Row label="Other Costs" value={fmt(extraCost)}/>}
              {colourMatchCost>0&&<Row label="Colour Match Test" sub="Material + machine · one-time" value={fmt(colourMatchCost)}/>}
              {bulkEnabled&&qty>1&&<>
                <div style={{borderTop:"1px dashed #333",marginTop:6,paddingTop:6}}/>
                <Row label={`Per-Unit x ${qty} units`} sub="Material + electricity + wear" value={fmt(perUnitCosts*qty)}/>
                {oneTimeCosts>0&&<Row label="One-Time Costs" sub="Drying + colour match" value={fmt(oneTimeCosts)}/>}
                {discountAmount>0&&<Row label={`Bulk Discount -- ${appliedDiscount}%`} sub="Per-unit costs only" value={`-${fmt(discountAmount)}`} highlight/>}
              </>}
              <div style={{borderTop:"2px solid #e63946",marginTop:8,paddingTop:16,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{color:"#e63946",fontSize:11,letterSpacing:2}}>{bulkEnabled&&qty>1?`TOTAL -- ${qty} UNITS`:"TOTAL PRODUCTION COST"}</div>
                    <div style={{color:"#444",fontSize:10,marginTop:2}}>Hard costs only · Labour in quote section</div>
                  </div>
                  <div style={{color:"#e63946",fontSize:26,fontWeight:900,fontFamily:"monospace"}}>{fmt(displayTotal)}</div>
                </div>
                {bulkEnabled&&qty>1&&<div style={{textAlign:"right",marginTop:6}}><span style={{color:"#555",fontSize:10}}>COST PER UNIT: </span><span style={{color:"#aaa",fontFamily:"monospace",fontSize:14,fontWeight:700}}>{fmt(costPerUnit)}</span></div>}
              </div>
              <div style={{color:"#333",fontSize:10,letterSpacing:1,paddingBottom:16}}>ELECTRICITY @ R{KWH_RATE}/kWh · NOZZLE & PEI AUTO-CALCULATED · CODEX REV 3.1</div>
            </div>

            {/* Production PDF buttons */}
            <div style={{display:"flex",gap:12,marginTop:16}}>
              <button style={{...BB,background:"#1c1c1c",color:"#ccc"}} onClick={()=>loadPDF(()=>generatePDF("jobsheet"))}>↓ Job Sheet</button>
              <button style={{...BB,background:"#e63946",color:"#fff"}} onClick={()=>loadPDF(()=>generatePDF("costreport"))}>↓ Cost Report</button>
            </div>
            <div style={{color:"#333",fontSize:10,marginTop:8,textAlign:"center",letterSpacing:1,marginBottom:8}}>JOB SHEET -- YOUR COPY · COST REPORT -- FOR TAYLOR</div>

            {/* DOCUMENTS */}
            <div style={{marginTop:24,borderTop:"1px solid #222",paddingTop:20}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <div style={{background:"#222",color:"#888",fontWeight:900,fontSize:10,padding:"2px 8px",letterSpacing:2}}>DOCS</div>
                <div style={{color:"#444",fontSize:10,letterSpacing:1}}>SOLIDUS DOCUMENTS</div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <a href="/Solidus_Manufacturing_TCs.pdf" download style={{flex:1,display:"block",padding:"13px 8px",border:"1px solid #333",borderRadius:4,background:"#111",color:"#aaa",fontSize:11,fontWeight:700,fontFamily:"monospace",letterSpacing:1,textTransform:"uppercase",textDecoration:"none",textAlign:"center"}}>↓ T&Cs</a>
                <a href="/Solidus_Client_Intake_Form.pdf" download style={{flex:1,display:"block",padding:"13px 8px",border:"1px solid #333",borderRadius:4,background:"#111",color:"#aaa",fontSize:11,fontWeight:700,fontFamily:"monospace",letterSpacing:1,textTransform:"uppercase",textDecoration:"none",textAlign:"center"}}>↓ Intake Form</a>
              </div>
              <div style={{color:"#2a2a2a",fontSize:9,textAlign:"center",letterSpacing:1,marginTop:6}}>T&Cs Rev 1.0 · Intake Form Rev 1.0</div>
            </div>

            {/* QUOTE SECTION */}
            <div style={{marginTop:32,borderTop:"2px solid #b48c3c",paddingTop:20}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <div style={{background:"#b48c3c",color:"#111",fontWeight:900,fontSize:10,padding:"2px 8px",letterSpacing:2}}>QUOTE</div>
                <div style={{color:"#666",fontSize:10,letterSpacing:1}}>FINAL PRICE BUILDER</div>
              </div>
              <div style={{color:"#333",fontSize:10,letterSpacing:1,marginBottom:16}}>HARD COSTS x MARKUP + RISK + YOUR LABOUR + SURCHARGES</div>

              {/* Job summary strip */}
              <div style={{background:"#111",border:"1px solid #222",borderRadius:4,padding:"10px 14px",marginBottom:20,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <div style={{fontSize:10,color:"#555"}}>MACHINE <span style={{color:"#888"}}>{MACHINES[machine].label.split("--")[0].trim()}</span></div>
                <div style={{fontSize:10,color:"#555"}}>MATERIAL <span style={{color:"#888"}}>{filaments[0]?.label||"--"}{filaments.length>1?" +"+( filaments.length-1)+" more":""}</span></div>
                <div style={{fontSize:10,color:"#555"}}>RISK <span style={{color:riskLevel>=4?"#e63946":"#888"}}>Level {riskLevel} -- {RISK_LEVELS[riskLevel-1].label}</span></div>
                <div style={{fontSize:10,color:"#555"}}>PROD <span style={{color:"#e63946",fontWeight:700}}>{fmt(displayTotal)}</span></div>
              </div>

              {/* 03 Quote ref */}
              <SH gold>-- 03 // QUOTE REFERENCE</SH>
              <div style={{marginBottom:20}}>
                <input style={{...IS,borderColor:"#2a2000"}} value={quoteRefOverride} onChange={e=>setQuoteRefOverride(e.target.value)} placeholder={"Auto: SLD-"+(jobDate||"YYYYMMDD").replace(/-/g,"")+"-"+(clientName||"CLT").substring(0,3).toUpperCase()}/>
                <div style={{color:"#444",fontSize:10,marginTop:5,letterSpacing:1}}>LEAVE BLANK TO AUTO-GENERATE</div>
              </div>

              {/* 04 Markup */}
              <SH gold>-- 04 // MARKUP MULTIPLIER</SH>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                {MULTIPLIERS.map(m=>{const ia=markupMultiplier===m;return<button key={m} onClick={()=>setMarkupMultiplier(m)} style={{padding:"8px 12px",border:ia?"2px solid #b48c3c":"1px solid #333",background:ia?"#b48c3c":"#111",color:ia?"#111":"#888",fontFamily:"monospace",fontSize:13,fontWeight:ia?900:400,cursor:"pointer",borderRadius:3,minWidth:48}}>{m.toFixed(1)}</button>;})}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginBottom:16}}>
                {MARKUP_TIERS.map(t=><div key={t.label} style={{fontSize:8,letterSpacing:0.5,textAlign:"center",color:getMuxTier(markupMultiplier).label===t.label?"#b48c3c":"#333",fontWeight:getMuxTier(markupMultiplier).label===t.label?700:400,padding:"3px 0",borderTop:getMuxTier(markupMultiplier).label===t.label?"1px solid #b48c3c":"1px solid #222"}}>{t.label}</div>)}
              </div>

              {/* 05 Risk */}
              <SH gold>-- 05 // OPERATIONAL RISK LEVEL</SH>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:12}}>
                {RISK_LEVELS.map(r=>{const ia=riskLevel===r.level;return<button key={r.level} onClick={()=>setRiskLevel(r.level)} style={{padding:"12px 4px",border:ia?"2px solid #b48c3c":"1px solid #333",background:ia?"#1a1300":"#111",color:ia?"#b48c3c":"#555",fontFamily:"monospace",cursor:"pointer",borderRadius:3,textAlign:"center"}}><div style={{fontSize:18,fontWeight:900,marginBottom:2}}>{r.level}</div><div style={{fontSize:9,letterSpacing:1}}>{r.label}</div></button>;})}
              </div>
              <div style={{background:"#111",border:"1px solid #222",borderLeft:"2px solid #b48c3c",padding:"12px 14px",marginBottom:16}}>
                <div style={{color:"#555",fontSize:9,letterSpacing:1,marginBottom:4}}>COMPLEXITY</div>
                <div style={{color:"#aaa",fontSize:13,marginBottom:8}}>{currentRisk.complexity}</div>
                <div style={{color:"#555",fontSize:9,letterSpacing:1,marginBottom:4}}>RECOMMENDED STRATEGY</div>
                <div style={{color:"#aaa",fontSize:13,marginBottom:8}}>{currentRisk.strategy}</div>
                <div style={{color:"#555",fontSize:9,letterSpacing:1,marginBottom:4}}>BUFFER APPLIED</div>
                <div style={{color:"#b48c3c",fontSize:16,fontWeight:700,fontFamily:"monospace"}}>{currentRisk.bufferPct}%</div>
              </div>

              {/* 06 Urgent */}
              <SH gold>-- 06 // URGENT SURCHARGE</SH>
              <div style={{marginBottom:16}}>
                <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",color:"#aaa",fontSize:13}}>
                  <input type="checkbox" checked={urgentEnabled} onChange={e=>setUrgentEnabled(e.target.checked)} style={{width:18,height:18,accentColor:"#b48c3c",flexShrink:0}}/>
                  P1 Urgent -- +50% on hard production cost ({urgentEnabled?fmt(urgentSurcharge):"R0.00"})
                </label>
                <div style={{color:"#333",fontSize:10,marginTop:6,letterSpacing:1}}>FOLDED INTO BASE BEFORE MARKUP</div>
              </div>

              {/* 07 Your Labour */}
              <SH gold>-- 07 // YOUR LABOUR (NOT MARKED UP)</SH>
              <div style={{color:"#333",fontSize:10,marginBottom:12,letterSpacing:1}}>CHARGED AT RATE · ADDED AFTER MARKUP & RISK · MARGIN DOES NOT APPLY</div>
              <Fld label="Surface Finish" hint="Post-processing labour -- R180/hr">
                <select style={{...SS,borderColor:"#2a2000"}} value={finish} onChange={e=>setFinish(e.target.value)}>
                  <option value="as_printed">As Printed -- 0 min</option>
                  <option value="cleaned">Cleaned -- ~15 min (R{(15*FINISH_RATE_MIN).toFixed(0)})</option>
                  <option value="smoothed">Smoothed -- ~45 min (R{(45*FINISH_RATE_MIN).toFixed(0)})</option>
                  <option value="polished">Polished (ABS only) -- ~90 min (R{(90*FINISH_RATE_MIN).toFixed(0)})</option>
                </select>
              </Fld>
              <Fld label="CAD / Design Time (R150/hr)" hint="Leave blank if no CAD required"><HM hVal={cadHours} hSet={setCadHours} mVal={cadMinutes} mSet={setCadMinutes}/></Fld>
              <Fld label="Operational / Setup Time (R180/hr)" hint="Machine prep, monitoring, handling"><HM hVal={opsHours} hSet={setOpsHours} mVal={opsMinutes} mSet={setOpsMinutes}/></Fld>

              {/* 08 Delivery */}
              <SH gold>-- 08 // DELIVERY (R)</SH>
              <div style={{marginBottom:16}}>
                <input style={{...IS,borderColor:"#2a2000"}} type="number" inputMode="decimal" value={deliveryCost} onChange={e=>setDeliveryCost(e.target.value)} placeholder="0.00"/>
                <div style={{color:"#444",fontSize:10,marginTop:5,letterSpacing:1}}>PASS-THROUGH · NOT MARKED UP</div>
              </div>

              {/* 09 Expiry */}
              <SH gold>-- 09 // QUOTE VALID FOR</SH>
              <div style={{marginBottom:16}}>
                <select style={{...SS,borderColor:"#2a2000"}} value={quoteExpiry} onChange={e=>setQuoteExpiry(parseInt(e.target.value))}>
                  <option value={3}>3 days</option><option value={7}>7 days (default)</option><option value={14}>14 days</option><option value={30}>30 days</option>
                </select>
              </div>

              {/* 10 Notes */}
              <SH gold>-- 10 // QUOTE NOTES (INTERNAL)</SH>
              <div style={{marginBottom:16}}>
                <textarea style={{...IS,height:80,resize:"vertical",lineHeight:"1.5"}} value={quoteNotes} onChange={e=>setQuoteNotes(e.target.value)} placeholder="Internal notes -- not shown to client..."/>
              </div>

              {/* Quote breakdown */}
              <div style={{background:"#0f0f0f",border:"1px solid #222",borderTop:"2px solid #b48c3c",padding:"16px 16px 4px",marginBottom:16}}>
                <div style={{color:"#b48c3c",fontSize:10,letterSpacing:2,marginBottom:12}}>-- QUOTE BREAKDOWN</div>
                <Row label="Hard Production Cost" sub={bulkEnabled&&qty>1?`${qty} units incl. bulk discount`:"Single job"} value={fmt(displayTotal)}/>
                {urgentSurcharge>0&&<Row label="Urgent Surcharge (+50%)" sub="Added before markup" value={fmt(urgentSurcharge)}/>}
                {urgentSurcharge>0&&<Row label="Production + Urgent" sub="Base for markup" value={fmt(productionPlusUrgent)}/>}
                <Row label={`Marked-up Base (x${markupMultiplier})`} sub={currentMuxTier.label} value={fmt(quotedBase)} gold/>
                {riskBuffer>0&&<Row label={`Risk Buffer (${currentRisk.bufferPct}%)`} sub={`Level ${riskLevel} -- ${currentRisk.label}`} value={fmt(riskBuffer)}/>}
                <div style={{borderTop:"1px dashed #2a2000",marginTop:6,paddingTop:6}}/>
                {finishLabour>0&&<Row label={`Finishing -- ${FINISH_MULTIPLIERS[finish].label}`} sub={`${FINISH_MULTIPLIERS[finish].labour} min x R180/hr`} value={fmt(finishLabour)} gold/>}
                {cadLabour>0&&<Row label="CAD / Design Time" sub={`${toHrs(cadHours,cadMinutes).toFixed(2)}h x R${CAD_RATE}/hr`} value={fmt(cadLabour)} gold/>}
                {opsLabour>0&&<Row label="Operational / Setup" sub={`${toHrs(opsHours,opsMinutes).toFixed(2)}h x R${OPS_RATE}/hr`} value={fmt(opsLabour)} gold/>}
                {customTextLabour>0&&<Row label="Custom Text Prep" sub={`${toHrs(customTextH,customTextM).toFixed(2)}h x R${CAD_RATE}/hr`} value={fmt(customTextLabour)} gold/>}
                {customLogoLabour>0&&<Row label="Logo/Artwork Prep" sub={`${toHrs(customLogoH,customLogoM).toFixed(2)}h x R${CAD_RATE}/hr`} value={fmt(customLogoLabour)} gold/>}
                {deliveryCostVal>0&&<Row label="Delivery" sub="Pass-through" value={fmt(deliveryCostVal)}/>}
                <div style={{borderTop:"2px solid #b48c3c",marginTop:8,paddingTop:14,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{color:"#b48c3c",fontSize:11,letterSpacing:2}}>{bulkEnabled&&qty>1?`TOTAL QUOTE -- ${qty} UNITS`:"TOTAL QUOTE PRICE"}</div>
                      <div style={{color:"#333",fontSize:10,marginTop:2}}>Markup + risk + labour + delivery</div>
                    </div>
                    <div style={{color:"#b48c3c",fontSize:26,fontWeight:900,fontFamily:"monospace"}}>{fmt(finalQuotePrice)}</div>
                  </div>
                  {bulkEnabled&&qty>1&&<div style={{textAlign:"right",marginTop:6}}><span style={{color:"#555",fontSize:10}}>PRICE PER UNIT: </span><span style={{color:"#aaa",fontFamily:"monospace",fontSize:14,fontWeight:700}}>{fmt(finalPricePerUnit)}</span></div>}
                </div>
                <div style={{color:"#333",fontSize:10,letterSpacing:1,paddingBottom:16}}>CODEX REV 3.1 · FOR TAYLOR -- REVIEW BEFORE SENDING</div>
              </div>

              {/* Profit */}
              <div style={{padding:"12px 16px",background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:4,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div>
                  <div style={{color:"#444",fontSize:10,letterSpacing:2}}>ESTIMATED PROFIT</div>
                  <div style={{color:"#2a2a2a",fontSize:9,marginTop:2}}>Quote minus hard costs minus labour</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:profitAmount>0?"#4caf50":"#e63946",fontFamily:"monospace",fontSize:20,fontWeight:900}}>{fmt(profitAmount)}</div>
                  <div style={{color:"#333",fontSize:10,fontFamily:"monospace"}}>{displayTotal>0?marginPct+"% margin on hard costs":"--"}</div>
                </div>
              </div>

              {/* Quote PDF buttons */}
              <div style={{display:"flex",gap:10,marginBottom:10}}>
                <button style={{...BB,background:"#b48c3c",color:"#111"}} onClick={()=>loadPDF(generateCustomerQuote)}>↓ CUSTOMER QUOTE</button>
                <button style={{...BB,border:"1px solid #444",background:"#1a1a1a",color:"#ccc"}} onClick={()=>loadPDF(generateInternalQuote)}>↓ INTERNAL QUOTE</button>
              </div>
              <div style={{color:"#333",fontSize:9,textAlign:"center",letterSpacing:1,marginBottom:20}}>CUSTOMER -- PRICE ONLY · INTERNAL -- FULL WORKINGS FOR TAYLOR</div>

              {/* Reset */}
              <button onClick={resetAll} style={{width:"100%",padding:"12px",background:"none",border:"1px solid #1a1a1a",borderRadius:4,color:"#2a2a2a",fontSize:10,fontFamily:"monospace",letterSpacing:2,cursor:"pointer",textTransform:"uppercase",marginBottom:32}}>RESET FORM</button>
            </div>

            {/* QUOTE HISTORY */}
            <div style={{borderTop:"1px solid #1a1a1a",paddingTop:20,marginBottom:40}}>
              <button onClick={()=>setShowHistory(h=>!h)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",background:"none",border:"none",cursor:"pointer",padding:"0 0 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{background:"#1a1a1a",color:"#555",fontWeight:900,fontSize:10,padding:"2px 8px",letterSpacing:2}}>HISTORY</div>
                  <div style={{color:"#333",fontSize:10,letterSpacing:1}}>{quoteHistory.length} QUOTE{quoteHistory.length!==1?"S":""} SAVED</div>
                </div>
                <div style={{color:"#333",fontSize:12}}>{showHistory?"▲":"▼"}</div>
              </button>
              {showHistory&&(
                <div>
                  {quoteHistory.length===0&&<div style={{color:"#333",fontSize:11,textAlign:"center",padding:"20px 0"}}>No quotes saved yet. Download a Customer Quote to save it here.</div>}
                  {quoteHistory.map(q=>(
                    <div key={q.id} style={{background:"#0f0f0f",border:"1px solid #1e1e1e",borderRadius:4,marginBottom:10,overflow:"hidden"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",cursor:"pointer"}} onClick={()=>setHistoryExpanded(historyExpanded===q.id?null:q.id)}>
                        <div>
                          <div style={{color:"#888",fontSize:12,fontWeight:700}}>{q.clientName}</div>
                          <div style={{color:"#444",fontSize:10,marginTop:2}}>{q.quoteRef} · {q.date}</div>

                        <div style={{textAlign:"right"}}>
                          <div style={{color:"#b48c3c",fontFamily:"monospace",fontSize:14,fontWeight:700}}>{fmt(q.finalQuotePrice)}</div>
                          <div style={{color:STATUS_COL[q.status],fontSize:9,letterSpacing:1,marginTop:2}}>{q.status}</div>
                        </div>
                      </div>
                      {historyExpanded===q.id&&(
                        <div style={{borderTop:"1px solid #1a1a1a",padding:"12px 14px"}}>
                          <div style={{color:"#555",fontSize:10,marginBottom:8}}>JOB: <span style={{color:"#777"}}>{q.jobDesc}</span><br/>PRODUCTION COST: <span style={{color:"#777"}}>{fmt(q.productionCost)}</span></div>
                          <div style={{color:"#444",fontSize:10,marginBottom:10,letterSpacing:1}}>UPDATE STATUS</div>
                          <div style={{display:"flex",gap:6,marginBottom:12}}>
                            {QUOTE_STATUS.map(s=><button key={s} onClick={()=>updateStatus(q.id,s)} style={{flex:1,padding:"8px 4px",border:q.status===s?`1px solid ${STATUS_COL[s]}`:"1px solid #222",borderRadius:3,background:q.status===s?"#0f0f0f":"none",color:q.status===s?STATUS_COL[s]:"#444",fontSize:9,fontFamily:"monospace",letterSpacing:1,cursor:"pointer",textTransform:"uppercase"}}>{s}</button>)}
                          </div>
                          <button onClick={()=>deleteQuote(q.id)} style={{width:"100%",padding:"8px",background:"none",border:"1px solid #1e1e1e",borderRadius:3,color:"#333",fontSize:9,fontFamily:"monospace",letterSpacing:1,cursor:"pointer",textTransform:"uppercase"}}>DELETE FROM HISTORY</button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>

          </div>
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
  <script>
    if("serviceWorker"in navigator){
      window.addEventListener("load",()=>{
        navigator.serviceWorker.register("/sw.js")
          .then(r=>console.log("SW:",r.scope))
          .catch(e=>console.log("SW fail:",e));
      });
    }
  </script>
</body>
</html>
